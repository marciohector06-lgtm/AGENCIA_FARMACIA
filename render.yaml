services:
  # TROCAR PRA "starter" ANTES DO TOTEM FÍSICO NA FARMÁCIA: free dorme após
  # ~15min sem tráfego (cold start ~30-50s por serviço) — inaceitável com
  # cliente real parado na frente do tablet. Ok por enquanto: piloto de casa,
  # esporádico, com o Márcio testando (ver DIVIDA_TECNICA.md).
  - type: web
    name: agencia-farmacia-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Precedência mais alta pra versão do Python no Render (acima do arquivo
      # backend/.python-version) — crewai>=1.15 não suporta 3.14, que é o
      # default atual do Render se isto não for fixado.
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_AGENTE_ATENDENTE
        sync: false
      - key: DATABASE_URL_AGENTE_ESTOQUE
        sync: false
      - key: DATABASE_URL_AGENTE_FINANCEIRO
        sync: false
      - key: DATABASE_URL_AGENTE_ORQUESTRADOR
        sync: false
      - key: DATABASE_URL_AGENTE_TRIBUTARIO
        sync: false
      - key: NFE_EMAIL_HOST
        sync: false
      - key: NFE_EMAIL_USER
        sync: false
      - key: NFE_EMAIL_PASSWORD
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini/gemini-flash-latest
      - key: ERP_PROVIDER
        value: mock
      - key: CREW_TIMEOUT_SECONDS
        value: "40"
      - key: DB_SSL_REQUIRE
        value: "true"
      # Pré-preenchido com a URL prevista do serviço "agencia-farmacia-frontend"
      # abaixo (Render deriva a URL do "name:" quando ele não colide com um já
      # existente). CONFIRME a URL real no dashboard depois do primeiro deploy
      # e corrija aqui se o Render tiver sufixado o nome por colisão.
      - key: CORS_ORIGINS
        value: '["https://agencia-farmacia-frontend.onrender.com"]'

  # Mesmo motivo do comentário acima — troque pra "starter" junto com o backend.
  - type: web
    name: agencia-farmacia-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      # Mesma lógica do CORS_ORIGINS acima, espelhada: aponta pra URL prevista
      # do serviço de backend. Confirme/corrija após o primeiro deploy.
      - key: NEXT_PUBLIC_API_URL
        value: https://agencia-farmacia-backend.onrender.com/api/v1
      # De propósito vazia — só existe uma filial de produção depois que o
      # backend estiver no ar (POST /api/v1/filiais). Preencher e forçar um
      # redeploy (rebuild, não só restart — NEXT_PUBLIC_* é inlined em build
      # time) assim que o id existir.
      - key: NEXT_PUBLIC_TOTEM_FILIAL_ID
        sync: false
      # Síntese de voz do Avatar (ver src/app/api/tts/route.ts) — SEM prefixo
      # NEXT_PUBLIC_ de propósito: só existe no processo Next server (Route
      # Handler), nunca chega ao bundle do navegador. Sem isto configurado,
      # /api/tts devolve 503 e useSintese (src/lib/useVoz.ts) cai pro
      # SpeechSynthesis nativo do navegador, sem quebrar o atendimento.
      - key: ELEVENLABS_API_KEY
        sync: false
      # Opcional — se vazio, /api/tts escolhe a melhor voz feminina em pt-BR
      # disponível na conta via GET /v1/voices (cacheado em memória pela vida
      # do processo). Preencher trava numa voz específica e evita depender da
      # permissão voices_read da chave (algumas chaves restritas só têm
      # permissão de text_to_speech).
      - key: ELEVENLABS_VOICE_ID
        sync: false
